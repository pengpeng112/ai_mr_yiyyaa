<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医疗记录一致性审计系统</title>
  <link rel="stylesheet" href="/vendor/element-plus.css" />
  <link rel="stylesheet" href="/styles/app.css" />
  <link rel="stylesheet" href="/styles/components/sidebar.css" />
  <link rel="stylesheet" href="/styles/components/header.css" />
  <link rel="stylesheet" href="/styles/components/stat-cards.css" />
  <link rel="stylesheet" href="/styles/components/charts.css" />
  <link rel="stylesheet" href="/styles/pages/dashboard.css" />
  <link rel="stylesheet" href="/styles/pages/logs.css" />
  <link rel="stylesheet" href="/styles/pages/feedback.css" />
  <link rel="stylesheet" href="/styles/pages/config.css" />
  <link rel="icon" href="data:," />
</head>
<body>
<div id="app">

  <div v-if="!isAuthenticated" class="login-shell">
    <div class="login-card">
      <div class="login-title">医疗记录一致性审计系统</div>
      <div class="login-subtitle">简单登录页，仅用于本地调试</div>
      <el-form :model="loginForm" label-position="top" @submit.prevent>
        <el-form-item label="用户名">
          <el-input v-model="loginForm.username" placeholder="请输入用户名" @keyup.enter="login"></el-input>
        </el-form-item>
        <el-form-item label="密码">
          <el-input v-model="loginForm.password" show-password placeholder="请输入密码" @keyup.enter="login"></el-input>
        </el-form-item>
        <el-button type="primary" :loading="loginLoading" style="width:100%" @click="login">登录</el-button>
      </el-form>
      <div class="config-hint" style="margin-top:12px">{{ loginHint }}</div>
    </div>
  </div>

  <template v-else>
  <el-drawer v-model="mobileMenuVisible" title="导航菜单" direction="ltr" size="78%" :with-header="true" class="mobile-drawer-menu">
    <el-menu :default-active="activeMenu" @select="(k)=>{ switchMenu(k); mobileMenuVisible=false; }" :default-openeds="mobileMenuOpeneds">
      <el-menu-item index="dashboard">🏠 仪表盘</el-menu-item>
      <el-menu-item index="audit">📊 审计中心</el-menu-item>
      <el-menu-item index="feedback">💬 质控反馈</el-menu-item>
      <el-menu-item index="menu-group-system" class="menu-group-item" disabled>─── 系统管理 ───</el-menu-item>
      <el-menu-item index="config">⚙️ 系统配置</el-menu-item>
      <el-menu-item index="access">👥 权限管理</el-menu-item>
      <el-menu-item index="scheduler">⏰ 定时任务</el-menu-item>
      <el-menu-item index="health">💚 系统健康</el-menu-item>
      <el-menu-item index="menu-group-dev" class="menu-group-item" disabled>─── 开发工具 ───</el-menu-item>
      <el-menu-item index="push">🚀 手动推送</el-menu-item>
      <el-menu-item index="debug">🔧 Dify 调试</el-menu-item>
    </el-menu>
  </el-drawer>

  <aside class="aside">
    <div class="logo-area">🏥 医护一致性监控</div>
    <el-menu :default-active="activeMenu" @select="switchMenu" :default-openeds="mobileMenuOpeneds">
      <el-menu-item index="dashboard">🏠 仪表盘</el-menu-item>
      <el-menu-item index="audit">📊 审计中心</el-menu-item>
      <el-menu-item index="feedback">💬 质控反馈</el-menu-item>
      <el-menu-item index="menu-group-system" class="menu-group-item" disabled>─── 系统管理 ───</el-menu-item>
      <el-menu-item index="config">⚙️ 系统配置</el-menu-item>
      <el-menu-item index="access">👥 权限管理</el-menu-item>
      <el-menu-item index="scheduler">⏰ 定时任务</el-menu-item>
      <el-menu-item index="health">💚 系统健康</el-menu-item>
      <el-menu-item index="menu-group-dev" class="menu-group-item" disabled>─── 开发工具 ───</el-menu-item>
      <el-menu-item index="push">🚀 手动推送</el-menu-item>
      <el-menu-item index="debug">🔧 Dify 调试</el-menu-item>
    </el-menu>
  </aside>

  <div class="main-area">
      <div class="top-header">
        <el-button class="mobile-menu-btn" size="small" @click="mobileMenuVisible=true">☰ 菜单</el-button>
      <span class="header-title">{{ pageTitle }}</span>
      <div class="header-right">
        <div v-if="pushIndicator.visible" class="push-indicator" @click="openPushProgressDrawer">
          <el-tag :type="pushIndicatorTagType" effect="dark" class="push-indicator-tag">{{ pushIndicatorText }}</el-tag>
          <el-button v-if="pushIndicator.status === 'running'" size="small" type="danger" plain class="push-stop-btn" @click.stop="stopPush">停止</el-button>
        </div>
        <span v-if="currentUser.username">{{ currentUser.full_name || currentUser.username }}</span>
        <span>{{ currentTime }}</span>
        <el-tag :type="overallHealth==='healthy'?'success':overallHealth==='degraded'?'warning':'danger'" size="small">
          {{ overallHealth==='healthy'?'系统正常':overallHealth==='degraded'?'部分异常':'系统异常' }}
        </el-tag>
        <el-button size="small" @click="logout">退出</el-button>
      </div>
    </div>

    <main class="content">
      <div class="content-shell">

      <section v-show="activeMenu==='dashboard'" class="page-view page-dashboard">
        <div class="stat-cards">
          <div class="stat-card stat-card--clickable">
              <div class="stat-icon stat-icon--primary">📤</div>
            <div class="stat-info">
                <div class="s-label">今日推送总数</div>
              <div class="s-value">{{ dashboardToday.total || 0 }}</div>
                <div class="s-sub">日期 {{ dashboardToday.date || '--' }}</div>
              </div>
          </div>
          <div class="stat-card stat-card--clickable">
              <div class="stat-icon stat-icon--success">✅</div>
            <div class="stat-info">
                <div class="s-label">今日推送成功</div>
              <div class="s-value s-value--success">{{ dashboardToday.success || 0 }}</div>
                <div class="s-sub">成功率 {{ dashboardToday.total ? pct(dashboardToday.success / dashboardToday.total * 100) : '--' }}</div>
              </div>
          </div>
          <div class="stat-card stat-card--clickable">
              <div class="stat-icon stat-icon--warning">⚠️</div>
            <div class="stat-info">
                <div class="s-label">今日发现不一致</div>
              <div class="s-value s-value--warning">{{ dashboardToday.inconsistency || 0 }}</div>
                <div class="s-sub s-sub--warning">需重点跟进</div>
              </div>
          </div>
          <div class="stat-card stat-card--clickable" @click="openDashboardFeedback('all')">
              <div class="stat-icon stat-icon--danger">🆕</div>
            <div class="stat-info">
                <div class="s-label">今日新增</div>
              <div class="s-value s-value--danger">{{ dashboardToday.newCases || 0 }}</div>
                <div class="s-sub s-sub--muted">点击跳转质控反馈</div>
              </div>
          </div>
          <div class="stat-card stat-card--clickable" @click="openDashboardFeedback('pending')">
              <div class="stat-icon stat-icon--warning">🕒</div>
            <div class="stat-info">
                <div class="s-label">待确认病例</div>
              <div class="s-value s-value--warning">{{ dashboardToday.pendingCases || 0 }}</div>
                <div class="s-sub s-sub--warning">点击查看 pending</div>
              </div>
          </div>
          <div class="stat-card stat-card--clickable" @click="switchMenu('scheduler')">
              <div class="stat-icon stat-icon--primary">⏱️</div>
            <div class="stat-info">
                <div class="s-label">最近执行时间</div>
              <div class="s-value s-value--primary">{{ dashboardToday.latestRunTime || '--' }}</div>
                <div class="s-sub">点击进入定时任务</div>
              </div>
          </div>
        </div>
        <div class="chart-row">
          <div class="chart-card">
              <div class="chart-title">📈 近30天推送趋势</div>
            <div id="dashChart" style="height:260px"></div>
          </div>
          <div class="chart-card">
              <div class="chart-title">💚 组件状态</div>
              <div v-for="(comp,key) in healthComps" :key="key" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5">
              <span style="font-weight:600;font-size:13px">{{ cname(key) }}</span>
              <div>
                <el-tag :type="comp.status==='up'||comp.status==='running'?'success':'danger'" size="small">{{ comp.status }}</el-tag>
                <span v-if="comp.latency_ms" style="font-size:12px;color:#8c8c8c;margin-left:6px">{{ comp.latency_ms }}ms</span>
              </div>
            </div>
            <div style="margin-top:14px;text-align:center">
                <el-button size="small" @click="loadHealth">🔄 刷新状态</el-button>
              </div>
            </div>
          </div>
          <div class="chart-card dashboard-alert-panel">
            <div class="chart-title">🚨 高风险待处理告警（最近 5 条）</div>
            <div v-if="dashboardAlerts.length" class="alert-timeline">
              <div v-for="item in dashboardAlerts" :key="item.id" class="alert-item" @click="openDashboardAlert(item)">
                <div class="alert-dot"></div>
                <div class="alert-content">
                  <div class="alert-head">
                    <span class="alert-time">{{ item.push_time }}</span>
                    <el-tag size="small" type="danger">高风险</el-tag>
                  </div>
                  <div class="alert-body">患者 {{ item.patient_name }}（{{ item.patient_id }}）｜{{ item.dept }}｜风险 {{ item.risk_score || 0 }}</div>
                </div>
              </div>
            </div>
            <el-empty v-else description="最近暂无高风险告警"></el-empty>
          </div>
        </section>

      <section v-show="activeMenu==='push'" class="page-view page-push">
        <div class="page-card">
          <div class="card-title">手动推送</div>
          <div class="push-layout">
            <el-form :model="pushForm" label-width="120px" class="push-form">
              <el-form-item label="数据源">
                <el-radio-group v-model="dataSourceType" @change="onDataSourceChange">
                  <el-radio value="oracle">Oracle</el-radio>
                  <el-radio value="postgresql">PostgreSQL</el-radio>
                </el-radio-group>
              </el-form-item>
              <el-form-item label="推送模式" required>
                <el-radio-group v-model="pushForm.date_mode">
                  <el-radio value="single">单日推送</el-radio>
                  <el-radio value="range">时间范围</el-radio>
                </el-radio-group>
              </el-form-item>
              <el-form-item label="日期维度" required>
                <el-select v-model="pushForm.date_dimension" style="width:260px">
                  <el-option label="病历创建日期" value="record_create_date"></el-option>
                  <el-option label="入院日期" value="admission_date"></el-option>
                  <el-option label="出院日期" value="discharge_date"></el-option>
                </el-select>
              </el-form-item>
              <el-form-item v-if="pushForm.date_mode==='single'" label="目标日期" required>
                <el-date-picker v-model="pushForm.query_date" type="date" placeholder="选择目标日期" value-format="YYYY-MM-DD" style="width:240px"></el-date-picker>
              </el-form-item>
              <el-form-item v-else label="目标日期范围" required>
                <el-date-picker v-model="pushForm.date_range" type="daterange" range-separator="至" start-placeholder="开始日期" end-placeholder="结束日期" value-format="YYYY-MM-DD" style="width:360px"></el-date-picker>
              </el-form-item>
              <el-form-item label="科室过滤">
                <el-input v-model="pushForm.dept_filter" placeholder="多个科室用逗号分隔；留空则使用系统配置科室"></el-input>
              </el-form-item>
              <el-form-item label="预览模式">
                <el-switch v-model="pushForm.dry_run"></el-switch>
                <span class="push-form-hint">仅查询并预览待推送数据，不调用 Dify。</span>
              </el-form-item>
              <el-form-item label="异步执行">
                <el-switch v-model="pushForm.async_mode" :disabled="pushForm.dry_run"></el-switch>
                <span class="push-form-hint">后台执行后可在顶部查看进度。</span>
              </el-form-item>
              <el-divider>批量推送设置</el-divider>
              <el-form-item label="并发工作线程">
                <el-input-number v-model="pushForm.parallel_workers" :min="1" :max="64" controls-position="right"></el-input-number>
                <span class="push-form-hint">建议先从 4 到 8 开始压测。</span>
              </el-form-item>
              <el-form-item label="空结果重试次数">
                <el-input-number v-model="pushForm.empty_retry_max" :min="0" :max="10" controls-position="right"></el-input-number>
              </el-form-item>
              <el-form-item label="重试退避毫秒">
                <el-input-number v-model="pushForm.empty_retry_backoff_ms" :min="0" :max="60000" :step="500" controls-position="right"></el-input-number>
              </el-form-item>
              <el-form-item label="目标分配策略">
                <el-select v-model="pushForm.target_strategy" style="width:220px">
                  <el-option label="轮询分发" value="round_robin"></el-option>
                  <el-option label="按权重随机" value="weighted_random"></el-option>
                </el-select>
              </el-form-item>
              <el-divider>多 Dify 并行配置</el-divider>
              <div class="push-target-toolbar">
                <el-button size="small" @click="appendDefaultDifyTarget">载入默认 Dify</el-button>
                <el-button size="small" @click="addEmptyPushTarget">新增 Dify 节点</el-button>
              </div>
              <div v-if="pushForm.dify_targets.length" class="push-target-list">
                <div v-for="(target, index) in pushForm.dify_targets" :key="`push-target-${index}`" class="push-target-card">
                  <div class="push-target-card-head">
                    <div class="push-target-card-title">Dify 节点 {{ index + 1 }}</div>
                    <div class="push-target-card-actions">
                      <el-switch v-model="target.enabled" active-text="启用" inactive-text="停用"></el-switch>
                      <el-button size="small" link @click="duplicatePushTarget(index)">复制</el-button>
                      <el-button size="small" link type="danger" @click="removePushTarget(index)">删除</el-button>
                    </div>
                  </div>
                  <div class="push-target-grid">
                    <el-input v-model="target.name" placeholder="节点名称，例如 dify-a"></el-input>
                    <el-input-number v-model="target.weight" :min="1" :max="100" controls-position="right"></el-input-number>
                    <el-input v-model="target.base_url" placeholder="Base URL，例如 http://host/v1"></el-input>
                    <el-input v-model="target.api_key" placeholder="API Key" show-password></el-input>
                    <el-input v-model="target.workflow_input_variable" placeholder="输入变量，例如 mr_txt"></el-input>
                    <el-input v-model="target.workflow_output_key" placeholder="输出键，例如 aa"></el-input>
                    <el-input v-model="target.user_identifier" placeholder="user_identifier"></el-input>
                    <el-input-number v-model="target.timeout_seconds" :min="1" :max="300" controls-position="right"></el-input-number>
                  </div>
                </div>
              </div>
              <div v-else class="config-hint">未额外配置 Dify 节点时，系统默认使用“系统配置”中的单个 Dify。</div>
              <div class="action-row" style="margin-top:16px">
                <el-button type="primary" :loading="pushLoading" @click="doPush">{{ pushForm.dry_run ? '预览数据' : '开始推送' }}</el-button>
                <el-button v-if="taskId" @click="queryProgress">查询进度</el-button>
              </div>
            </el-form>

            <div class="push-side-panel">
              <div v-if="taskProg" class="page-card push-progress-box">
                <div class="push-progress-head">
                  <span class="push-result-title">任务进度</span>
                  <el-tag :type="taskProg.status==='completed' ? 'success' : taskProg.status==='failed' ? 'danger' : 'warning'">{{ taskProg.status }}</el-tag>
                </div>
                <div class="push-progress-text">任务 ID：<b>{{ taskProg.task_id }}</b></div>
                <el-progress :percentage="taskProg.total ? Math.round(taskProg.processed / taskProg.total * 100) : 0"></el-progress>
                <div class="push-progress-text">已处理 {{ taskProg.processed }}/{{ taskProg.total }}，成功 {{ taskProg.success }}，失败 {{ taskProg.failed }}</div>
              </div>

              <div v-if="pushResult" class="page-card push-result-wrap">
                <div class="push-result-title">推送结果</div>
                <el-alert v-if="pushResult.dry_run" type="info" :closable="false" show-icon style="margin-bottom:10px">
                  <template #default>预览模式：共 <b>{{ pushResult.total_patients }}</b> 名患者，<b>{{ pushResult.total_records }}</b> 条记录。</template>
                </el-alert>
                <el-alert v-else type="success" :closable="false" show-icon style="margin-bottom:10px">
                  <template #default>
                    已提交推送任务，成功 <b>{{ pushResult.success || 0 }}</b>，失败 <b>{{ pushResult.failed || 0 }}</b>。
                    <span v-if="pushResult.used_bulk_executor">实际并发 <b>{{ pushResult.parallel_workers_effective || 1 }}</b>，空结果重试累计 <b>{{ pushResult.empty_retry_total || 0 }}</b>。</span>
                  </template>
                </el-alert>
                <!-- 多Dify节点分配统计 -->
                <el-alert v-if="pushResult.target_metrics && Object.keys(pushResult.target_metrics).length > 1" type="info" :closable="false" show-icon style="margin-bottom:10px">
                  <template #default>
                    <b>Dify 节点分配统计：</b>
                    <span v-for="(metrics, name) in pushResult.target_metrics" :key="name" style="margin-right:12px">
                      {{ name }}：分配 {{ metrics.selected }} 次 / 成功 {{ metrics.success }} / 失败 {{ metrics.failed }}<span v-if="metrics.empty"> / 空结果 {{ metrics.empty }}</span>
                    </span>
                  </template>
                </el-alert>
                <el-alert v-if="(pushResult.diagnostics || []).length" type="warning" :closable="false" show-icon style="margin-bottom:10px">
                  <template #default>
                    <ul class="push-diagnostics">
                      <li v-for="(item, idx) in pushResult.diagnostics" :key="`diag-${idx}`">{{ item }}</li>
                    </ul>
                  </template>
                </el-alert>
                <el-table v-if="pushResult.dry_run && (pushResult.preview || []).length" :data="pushResult.preview" border size="small" stripe>
                  <el-table-column prop="patient_id" label="患者ID" width="120"></el-table-column>
                  <el-table-column prop="patient_name" label="姓名" width="100"></el-table-column>
                  <el-table-column prop="dept" label="科室" width="120"></el-table-column>
                  <el-table-column prop="record_count" label="记录数" width="80"></el-table-column>
                  <el-table-column prop="mr_text_preview" label="病历预览" min-width="260"></el-table-column>
                  <el-table-column label="Dify JSON 预览" min-width="320">
                    <template #default="scope">
                      <pre class="result-pre result-block compact-json">{{ prettyJson(scope.row.dify_payload) }}</pre>
                    </template>
                  </el-table-column>
                </el-table>
                <el-table v-if="!pushResult.dry_run && (pushResult.results || []).length" :data="pushResult.results" border size="small" stripe>
                  <el-table-column prop="patient_id" label="患者ID" width="120"></el-table-column>
                  <el-table-column prop="status" label="状态" width="90"></el-table-column>
                  <el-table-column prop="severity" label="严重度" width="90"></el-table-column>
                  <el-table-column prop="target_name" label="Dify节点" width="120"></el-table-column>
                  <el-table-column prop="error" label="错误信息" min-width="220"></el-table-column>
                </el-table>
              </div>
            </div>
          </div>
        </section>

      <section v-show="activeMenu==='audit'" class="page-view">
        <div class="page-card page-tab-card">
          <el-tabs v-model="auditTab" @tab-change="switchAuditTab">
            <el-tab-pane label="推送日志" name="logs"></el-tab-pane>
            <el-tab-pane label="数据统计" name="stats"></el-tab-pane>
          </el-tabs>
        </div>
      </section>

      <section v-show="activeMenu==='logs' || (activeMenu==='audit' && auditTab==='logs')" class="page-view page-logs">
        <div class="page-card">
          <div class="card-title">
              <span>推送日志</span>
              <div class="action-row compact-actions">
                <el-button size="small" type="warning" @click="retrySelectedLogs">批量重推</el-button>
                <el-button size="small" type="success" @click="exportCsv">📥 导出CSV</el-button>
              </div>
          </div>
           <div class="filter-bar">
              <el-select v-model="lf.status" placeholder="状态" clearable size="small" style="width:110px" @change="onLogFilterChange">
                <el-option label="成功" value="success"></el-option>
                <el-option label="失败" value="failed"></el-option>
                <el-option label="跳过" value="skipped"></el-option>
                <el-option label="待处理" value="pending"></el-option>
            </el-select>
              <el-input v-model="lf.dept" placeholder="科室" clearable size="small" style="width:110px" @input="onLogFilterInput" @clear="onLogFilterChange"></el-input>
              <el-date-picker v-model="lf.date_from" type="date" value-format="YYYY-MM-DD" placeholder="开始日期" clearable size="small" style="width:140px" @change="onLogFilterChange"></el-date-picker>
              <el-date-picker v-model="lf.date_to" type="date" value-format="YYYY-MM-DD" placeholder="结束日期" clearable size="small" style="width:140px" @change="onLogFilterChange"></el-date-picker>
              <el-input v-model="lf.patient_id" placeholder="患者ID" clearable size="small" style="width:130px" @input="onLogFilterInput" @clear="onLogFilterChange"></el-input>
              <el-button type="primary" size="small" @click="loadLogs(1)">查询</el-button>
              <el-button size="small" @click="resetLF">重置</el-button>
             </div>
             <div v-if="logTimeWindow" class="log-time-window-hint">
               <el-tag type="warning" effect="light">时间窗：{{ logTimeWindow.label }}</el-tag>
               <el-button link type="primary" @click="clearLogTimeWindow">清除时间窗</el-button>
             </div>
             <div class="table-container">

              <div class="health-card" v-for="(comp, key) in healthComps" :key="key">
                <div class="health-icon-big">{{ comp.status === 'up' || comp.status === 'running' ? '🟢' : comp.status === 'disabled' ? '⚪' : '🔴' }}</div>
                <div class="health-name">{{ cname(key) }}</div>
                <el-tag :type="comp.status === 'up' || comp.status === 'running' ? 'success' : comp.status === 'disabled' ? 'info' : 'danger'">{{ comp.status }}</el-tag>
                <div class="health-latency" v-if="comp.latency_ms">延迟 {{ comp.latency_ms }} ms</div>
                <div class="health-latency" v-if="comp.next_run">下次执行 {{ comp.next_run }}</div>
                <div class="health-latency" v-if="comp.message">{{ comp.message }}</div>
                <div class="action-row center-row" v-if="key !== 'scheduler'">
                  <el-button size="small" @click="pingHealthComponent(key)">单项检测</el-button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section v-show="activeMenu==='debug'" class="page-view">
          <div class="page-card">
            <div class="card-title">
              <span>Dify 调试</span>
              <div class="action-row compact-actions">
                <el-button size="small" @click="fillDebugPayloadTemplate">填充 JSON 模板</el-button>
              </div>
            </div>
            <el-form :model="debugForm" label-width="150px" class="config-form">
              <div class="config-grid two-cols">
                <el-form-item label="调试用户"><el-input v-model="debugForm.user"></el-input></el-form-item>
                <el-form-item label="输入变量名"><el-input v-model="debugForm.workflow_input_variable" placeholder="留空使用当前配置"></el-input></el-form-item>
                <el-form-item label="输出变量名"><el-input v-model="debugForm.workflow_output_key" placeholder="留空使用当前配置"></el-input></el-form-item>
                <el-form-item label="输入模式">
                  <el-radio-group v-model="debugForm.input_mode">
                    <el-radio-button label="json">结构化 JSON</el-radio-button>
                    <el-radio-button label="text">纯文本</el-radio-button>
                  </el-radio-group>
                </el-form-item>
              </div>
              <el-form-item label="额外参数(JSON)">
                <el-input v-model="debugForm.extra_inputs_text" type="textarea" :rows="6" @input="onDebugExtraInputsInput"></el-input>
                <div v-if="jsonErrors.debugExtraInputs" class="config-error">{{ jsonErrors.debugExtraInputs }}</div>
              </el-form-item>
              <el-form-item v-if="debugForm.input_mode==='json'" label="结构化 JSON">
                <el-input v-model="debugForm.payload_json_text" type="textarea" :rows="16" placeholder="请输入结构化请求 JSON" @input="onDebugPayloadInput"></el-input>
                <div v-if="jsonErrors.debugPayload" class="config-error">{{ jsonErrors.debugPayload }}</div>
              </el-form-item>
              <el-form-item v-else label="病历文本"><el-input v-model="debugForm.mr_txt" type="textarea" :rows="12" placeholder="请输入需要送入 Dify 的病历内容"></el-input></el-form-item>
              <div class="action-row">
                <el-button type="primary" :loading="cfgLoading" @click="runDifyDebug">开始调试</el-button>
                <el-button :loading="cfgLoading" @click="resetDebugPage">重置</el-button>
              </div>
            </el-form>
          </div>
          <div class="page-card" v-if="debugResult">
            <div class="card-title">调试结果</div>
            <div class="report-shell">
              <div class="detail-grid">
                <div><b>接口状态：</b>{{ debugResult.status || '--' }}</div>
                <div><b>工作流运行ID：</b>{{ debugResult.workflow_run_id || '--' }}</div>
                <div><b>任务ID：</b>{{ debugResult.task_id || '--' }}</div>
                <div><b>耗时：</b>{{ debugResult.elapsed_ms || 0 }} ms</div>
                <div><b>不一致：</b>{{ debugResult.inconsistency ? '是' : '否' }}</div>
                <div><b>严重度：</b>{{ debugResult.severity || '--' }}</div>
              </div>

              <div class="sub-card">
                <div class="sub-card-title">JSON 合法性检测</div>
                <el-alert :title="debugValidationText(debugResult)" :type="debugValidationType(debugResult)" :closable="false" show-icon></el-alert>
              </div>

              <div class="sub-card">
                <div class="sub-card-title">解析结果预览</div>
                <pre class="result-pre result-block">{{ debugParsedPreview(debugResult) || '无' }}</pre>
              </div>

              <div class="sub-card" v-if="debugParseError(debugResult)">
                <div class="sub-card-title">解析失败原因</div>
                <pre class="result-pre result-block result-error">{{ debugParseError(debugResult) }}</pre>
              </div>

              <div class="sub-card">
                <div class="sub-card-title">原始输出</div>
                <pre class="result-pre result-block">{{ debugRawOutput(debugResult) || '无' }}</pre>
              </div>

              <div class="sub-card">
                <div class="sub-card-title">完整调试响应</div>
                <pre class="result-pre result-block">{{ formatTestResult(debugResult) }}</pre>
              </div>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>
  </template>
</div>

<script src="/vendor/vue.global.prod.js"></script>
<script src="/vendor/element-plus.full.min.js"></script>
<script src="/vendor/axios.min.js"></script>
<script src="/vendor/echarts.min.js"></script>
<script src="/vendor/dayjs.min.js"></script>
<script type="module" src="/scripts/app.js"></script>
</body>
</html>
