<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医疗记录一致性审计系统</title>
  <link rel="stylesheet" href="/vendor/element-plus.css" />
  <link rel="stylesheet" href="/styles/app.css" />
  <link rel="stylesheet" href="/styles/components/sidebar.css" />
  <link rel="stylesheet" href="/styles/components/header.css" />
  <link rel="stylesheet" href="/styles/components/stat-cards.css" />
  <link rel="stylesheet" href="/styles/components/charts.css" />
  <link rel="stylesheet" href="/styles/pages/dashboard.css" />
  <link rel="stylesheet" href="/styles/pages/logs.css" />
  <link rel="stylesheet" href="/styles/pages/feedback.css" />
  <link rel="stylesheet" href="/styles/pages/patient_qc.css" />
  <link rel="stylesheet" href="/styles/pages/config.css" />
  <link rel="stylesheet" href="/styles/pages/audit_types.css?v=20260524-visual-editor" />
  <link rel="icon" href="data:," />
</head>
<body>
<div id="app">

  <div v-if="!isAuthenticated" class="login-shell">
    <div class="login-card">
      <div class="login-title">医疗记录一致性审计系统</div>
      <div class="login-subtitle">请使用系统账号登录</div>
      <el-form :model="loginForm" label-position="top" @submit.prevent>
        <el-form-item label="用户名">
          <el-input v-model="loginForm.username" placeholder="请输入用户名" @keyup.enter="login"></el-input>
        </el-form-item>
        <el-form-item label="密码">
          <el-input v-model="loginForm.password" show-password placeholder="请输入密码" @keyup.enter="login"></el-input>
        </el-form-item>
        <el-button type="primary" :loading="loginLoading" style="width:100%" @click="login">登录</el-button>
      </el-form>
      <div class="config-hint" style="margin-top:12px">{{ loginHint }}</div>
    </div>
  </div>

  <template v-else>
  <el-drawer v-model="mobileMenuVisible" title="导航菜单" direction="ltr" size="78%" :with-header="true" class="mobile-drawer-menu">
    <el-menu :default-active="activeMenu" @select="(k)=>{ switchMenu(k); mobileMenuVisible=false; }" :default-openeds="mobileMenuOpeneds">
      <el-menu-item index="dashboard">🏠 仪表盘</el-menu-item>
      <el-menu-item index="audit">📊 审计中心</el-menu-item>
      <el-menu-item index="feedback">💬 质控反馈</el-menu-item>
      <el-menu-item index="patient-qc">🧑‍⚕️ 患者质控总览</el-menu-item>
      <el-menu-item index="menu-group-system" class="menu-group-item" disabled>─── 系统管理 ───</el-menu-item>
      <el-menu-item index="config">⚙️ 系统配置</el-menu-item>
      <el-menu-item index="audit-types">🧩 审计类型</el-menu-item>
      <el-menu-item index="access">👥 权限管理</el-menu-item>
      <el-menu-item index="scheduler">⏰ 定时任务</el-menu-item>
      <el-menu-item index="relay">📡 人员配置</el-menu-item>
      <el-menu-item index="health">💚 系统健康</el-menu-item>
      <el-menu-item index="menu-group-dev" class="menu-group-item" disabled>─── 开发工具 ───</el-menu-item>
      <el-menu-item index="push">🚀 手动推送</el-menu-item>
      <el-menu-item index="debug">🔧 Dify 调试</el-menu-item>
    </el-menu>
  </el-drawer>

  <aside class="aside">
    <div class="logo-area">🏥 医护一致性监控</div>
    <el-menu :default-active="activeMenu" @select="switchMenu" :default-openeds="mobileMenuOpeneds">
      <el-menu-item index="dashboard">🏠 仪表盘</el-menu-item>
      <el-menu-item index="audit">📊 审计中心</el-menu-item>
      <el-menu-item index="feedback">💬 质控反馈</el-menu-item>
      <el-menu-item index="patient-qc">🧑‍⚕️ 患者质控总览</el-menu-item>
      <el-menu-item index="menu-group-system" class="menu-group-item" disabled>─── 系统管理 ───</el-menu-item>
      <el-menu-item index="config">⚙️ 系统配置</el-menu-item>
      <el-menu-item index="audit-types">🧩 审计类型</el-menu-item>
      <el-menu-item index="access">👥 权限管理</el-menu-item>
      <el-menu-item index="scheduler">⏰ 定时任务</el-menu-item>
      <el-menu-item index="relay">📡 人员配置</el-menu-item>
      <el-menu-item index="health">💚 系统健康</el-menu-item>
      <el-menu-item index="menu-group-dev" class="menu-group-item" disabled>─── 开发工具 ───</el-menu-item>
      <el-menu-item index="push">🚀 手动推送</el-menu-item>
      <el-menu-item index="debug">🔧 Dify 调试</el-menu-item>
    </el-menu>
  </aside>

  <div class="main-area">
      <div class="top-header">
        <el-button class="mobile-menu-btn" size="small" @click="mobileMenuVisible=true">☰ 菜单</el-button>
      <span class="header-title">{{ pageTitle }}</span>
      <div class="header-right">
        <div v-if="pushIndicator.visible" class="push-indicator" @click="openPushProgressDrawer">
          <el-tag :type="pushIndicatorTagType" effect="dark" class="push-indicator-tag">{{ pushIndicatorText }}</el-tag>
          <el-button v-if="pushIndicator.status === 'running'" size="small" type="danger" plain class="push-stop-btn" @click.stop="stopPush">停止</el-button>
        </div>
        <span v-if="currentUser.username">{{ currentUser.full_name || currentUser.username }}</span>
        <span>{{ currentTime }}</span>
        <el-tag :type="overallHealth==='healthy'?'success':overallHealth==='degraded'?'warning':'danger'" size="small">
          {{ overallHealth==='healthy'?'系统正常':overallHealth==='degraded'?'部分异常':'系统异常' }}
        </el-tag>
        <el-button size="small" @click="logout">退出</el-button>
      </div>
    </div>

    <main class="content">
      <div class="content-shell">

            <div data-template-src="/templates/pages/dashboard.html"></div>

            <div data-template-src="/templates/pages/push.html?v=20260524-bundle-preview"></div>

              <div data-template-src="/templates/pages/audit.html?v=20260524-log-limit-1000"></div>

                <div data-template-src="/templates/pages/feedback.html?v=20260429-feedback-bulk-delete"></div>

                <div data-template-src="/templates/pages/patient_qc.html"></div>

                <div data-template-src="/templates/pages/audit_types.html?v=20260524-visual-editor"></div>

                <div data-template-src="/templates/pages/access.html"></div>

                <div data-template-src="/templates/pages/config.html"></div>

                <div data-template-src="/templates/pages/scheduler.html"></div>

                <div data-template-src="/templates/pages/relay.html"></div>

                <div data-template-src="/templates/common/overlays.html"></div>

                <div data-template-src="/templates/pages/health.html"></div>

                <div data-template-src="/templates/pages/debug.html"></div>

      </div>
    </main>
  </div>
  </template>
</div>

<script src="/vendor/vue.global.prod.js"></script>
<script src="/vendor/element-plus.full.min.js"></script>
<script src="/vendor/axios.min.js"></script>
<script src="/vendor/echarts.min.js"></script>
<script src="/vendor/dayjs.min.js"></script>
<script type="module" src="/scripts/app.js?v=20260607-audit-runtime-summary-dify-safe"></script>
</body>
</html>
