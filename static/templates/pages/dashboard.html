<section v-show="activeMenu==='dashboard'" class="page-view page-dashboard dashboard-screen">

  <div v-if="dashboardLoading" class="dashboard-skeleton">
    <div class="dashboard-hero skeleton-hero">
      <div><div class="sk-line sk-line--long"></div><div class="sk-line sk-line--short"></div></div>
      <div><div class="sk-line sk-line--tiny"></div></div>
    </div>
    <div class="dashboard-command-strip">
      <div class="command-item" v-for="n in 4" :key="n"><span class="sk-line sk-line--tiny"></span><b class="sk-line sk-line--tiny"></b></div>
    </div>
    <div class="dashboard-kpi-grid">
      <div class="dashboard-kpi-card sk-card" v-for="n in 4" :key="n"><div class="sk-line sk-line--short"></div><div class="sk-line sk-line--long sk-line--tall"></div></div>
    </div>
    <div class="dashboard-kpi-grid" style="margin-bottom:20px">
      <div class="dashboard-kpi-card sk-card" v-for="n in 4" :key="n"><div class="sk-line sk-line--short"></div><div class="sk-line sk-line--long sk-line--tall"></div></div>
    </div>
    <div class="dashboard-grid">
      <div class="dashboard-panel sk-card panel-main-trend" style="height:340px"><div class="sk-line sk-line--short"></div></div>
      <div class="dashboard-panel sk-card" style="height:280px"><div class="sk-line sk-line--short"></div></div>
      <div class="dashboard-panel sk-card panel-dimension" style="height:280px"><div class="sk-line sk-line--short"></div></div>
      <div class="dashboard-panel sk-card" style="height:280px"><div class="sk-line sk-line--short"></div></div>
    </div>
  </div>

  <template v-else>
  <div class="dashboard-hero">
    <div>
      <div class="dashboard-kicker">山东省第二人民医院 · AI Medical Quality Control</div>
      <div class="dashboard-title">AI质控运营驾驶舱</div>
      <div class="dashboard-subtitle">住院病历一致性质控 · 风险预警 · 推送闭环 · 系统运行状态</div>
    </div>
    <div class="dashboard-hero-right">
      <div class="dashboard-time">{{ currentTime }}</div>
      <el-tag :type="overallHealth==='healthy'?'success':overallHealth==='degraded'?'warning':'danger'" size="small">
        {{ overallHealth==='healthy'?'系统正常':overallHealth==='degraded'?'部分异常':'系统异常' }}
      </el-tag>
      <el-button size="small" class="dashboard-refresh-btn" @click="loadDashboard" :loading="dashboardLoading">刷新</el-button>
    </div>
  </div>

    <div class="dashboard-command-strip">
      <div class="command-item">
        <span class="command-label">今日不一致率</span>
        <b>{{ dashboardKpis.inconsistencyRate !== null ? pct(dashboardKpis.inconsistencyRate) : '--' }}</b>
      </div>
      <div class="command-item">
        <span class="command-label">前置机失败</span>
        <b class="command-danger">{{ dashboardKpis.relayFailed || 0 }}</b>
      </div>
      <div class="command-item">
        <span class="command-label">医生未查看</span>
        <b class="command-warning">{{ dashboardKpis.relayUnviewed || 0 }}</b>
      </div>
    </div>

  <!-- 今日运行指标 -->
  <div class="dashboard-kpi-section">
    <div class="dashboard-section-title"><span class="section-dot"></span>今日运行指标</div>
    <div class="dashboard-kpi-grid">
      <div class="dashboard-kpi-card" @click="openDashboardTarget('audit')">
        <div class="kpi-label">今日推送总数</div>
        <div class="kpi-value">{{ dashboardKpis.total || 0 }}</div>
        <div class="kpi-sub">日期 {{ dashboardKpis.date || '--' }}</div>
      </div>
      <div class="dashboard-kpi-card" @click="openDashboardTarget('audit')">
        <div class="kpi-label">今日成功率</div>
        <div class="kpi-value kpi-success">{{ dashboardKpis.effectiveTotal ? pct(dashboardKpis.successRate) : '--' }}</div>
        <div class="kpi-sub">成功 {{ dashboardKpis.todaySuccess || 0 }} / 参与计算 {{ dashboardKpis.effectiveTotal || 0 }}</div>
      </div>
      <div class="dashboard-kpi-card" @click="openDashboardTarget('patient-qc')">
        <div class="kpi-label"><el-tag size="small" type="danger" effect="plain" style="border:0">今日不一致</el-tag></div>
        <div class="kpi-value kpi-danger">{{ dashboardKpis.inconsistency || 0 }}</div>
        <div class="kpi-sub kpi-sub-warning">点击查看患者质控</div>
      </div>
      <div class="dashboard-kpi-card" @click="openDashboardTarget('audit')">
        <div class="kpi-label">今日推送成功</div>
        <div class="kpi-value kpi-success">{{ dashboardKpis.todaySuccess || 0 }}</div>
        <div class="kpi-sub">占总推送 {{ dashboardKpis.total ? pct(dashboardKpis.successRate) : '--' }}</div>
      </div>
    </div>
  </div>

  <!-- 风险闭环指标 -->
  <div class="dashboard-kpi-section">
    <div class="dashboard-section-title"><span class="section-dot"></span>风险闭环指标</div>
    <div class="dashboard-kpi-grid">
      <div class="dashboard-kpi-card" @click="openDashboardTarget('patient-qc')">
        <div class="kpi-label"><el-tag size="small" type="danger" effect="plain" style="border:0">累计高危问题</el-tag></div>
        <div class="kpi-value kpi-danger">{{ dashboardKpis.highRisk || 0 }}</div>
        <div class="kpi-sub">全量 {{ dashboardKpis.highRisk || 0 }} 个高危维度</div>
      </div>
      <div class="dashboard-kpi-card" @click="openDashboardFeedback('pending')">
        <div class="kpi-label"><el-tag size="small" type="warning" effect="plain" style="border:0">待处理反馈</el-tag></div>
        <div class="kpi-value kpi-warning">{{ dashboardKpis.pendingFeedback || 0 }}</div>
        <div class="kpi-sub">点击进入质控反馈</div>
      </div>
      <div class="dashboard-kpi-card" @click="openDashboardTarget('relay-alerts')">
        <div class="kpi-label">前置机发送成功率</div>
        <div class="kpi-value kpi-value-sm">{{ dashboardKpis.relaySuccessRate !== null ? pct(dashboardKpis.relaySuccessRate) : '--' }}</div>
        <div class="kpi-sub">全量告警 {{ dashboardKpis.relayRecentTotal || 0 }} 条</div>
      </div>
      <div class="dashboard-kpi-card" @click="openDashboardTarget('relay-alerts')">
        <div class="kpi-label">医生查看率</div>
        <div class="kpi-value kpi-value-sm">{{ dashboardKpis.viewRate !== null ? pct(dashboardKpis.viewRate) : '--' }}</div>
        <div class="kpi-sub">累计已查看 {{ dashboardKpis.relayViewed || 0 }} 条</div>
      </div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="dashboard-panel panel-main-trend">
      <div class="panel-title">📈 近30天质控趋势</div>
      <div id="dashTrendChart" class="dashboard-chart"></div>
    </div>
    <div class="dashboard-panel">
      <div class="panel-title">🥧 风险等级分布</div>
      <div id="dashSeverityChart" class="dashboard-chart dashboard-chart-sm"></div>
    </div>
    <div class="dashboard-panel panel-dimension">
      <div class="panel-title">📊 质控维度分布</div>
      <div id="dashDimensionChart" class="dashboard-chart dashboard-chart-sm"></div>
    </div>
    <div class="dashboard-panel">
      <div class="panel-title">🖥️ 系统健康矩阵</div>
      <div class="health-list" v-if="Object.keys(healthComps||{}).length">
        <div v-for="(comp,key) in healthComps" :key="key" class="health-row">
          <span class="health-status-dot" :class="comp.status==='up'||comp.status==='running'?'up':comp.status==='disabled'?'disabled':'down'"></span>
          <span class="health-comp-name">{{ cname(key) }}</span>
          <span class="health-status-text" :class="comp.status==='up'||comp.status==='running'?'up':comp.status==='disabled'?'disabled':'down'">{{ comp.status }}</span>
          <span v-if="comp.latency_ms" class="health-latency">{{ comp.latency_ms }}ms</span>
        </div>
      </div>
      <div v-else class="dashboard-empty">暂无组件状态</div>
    </div>
    <div class="dashboard-panel panel-event-flow">
      <div class="panel-title">🚨 高风险事件流</div>
      <div v-if="dashboardEvents.length" class="event-list">
        <div v-for="item in dashboardEvents" :key="item.id" class="event-item" @click="openDashboardAlert(item)">
          <div class="event-dot"></div>
          <div class="event-content">
            <div class="event-head"><span class="event-time">{{ item.push_time }}</span><el-tag size="small" type="danger">高风险</el-tag></div>
            <div class="event-body">患者 {{ item.patient_name }}（{{ item.patient_id }}）｜{{ item.dept }}｜风险分 {{ item.risk_score || 0 }}</div>
          </div>
        </div>
      </div>
      <el-empty v-else description="最近暂无高风险告警" :image-size="60"></el-empty>
    </div>
    <div class="dashboard-panel">
      <div class="panel-title">📋 科室风险 TOP</div>
      <div class="dept-top-list" v-if="dashboardDeptTop.length">
        <div v-for="(item,idx) in dashboardDeptTop" :key="item.dept" class="dept-top-row">
          <span class="dept-top-rank" :class="'rank-'+Math.min(idx+1,3)">{{ idx + 1 }}</span>
          <span class="dept-top-name">{{ item.dept || '未知' }}</span>
          <span class="dept-top-count">{{ item.inconsistency_count || 0 }}</span>
        </div>
      </div>
      <el-empty v-else description="暂无数据" :image-size="60"></el-empty>
    </div>
  </div>

  <div class="dashboard-scheduler-bar" v-if="dashboardScheduler.lastRunTime">
    最近调度：{{ dashboardScheduler.lastRunTime }}
    <span v-if="dashboardScheduler.nextRunTime">｜下次：{{ dashboardScheduler.nextRunTime }}</span>
  </div>
  </template>
</section>
